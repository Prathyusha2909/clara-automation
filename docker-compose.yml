services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    container_name: clara-n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Calcutta
      - N8N_ENABLE_EXECUTE_COMMAND=true
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./:/workspace
    restart: unless-stopped
